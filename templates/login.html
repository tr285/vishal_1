{% extends "base.html" %}

{% block content %}
<div class="d-flex align-items-center justify-content-center" style="min-height: 80vh;">
    <div class="glass-card p-5" style="width: 100%; max-width: 400px;">
        <div class="text-center mb-4">
            <h2 class="fw-bold text-primary"><img src="{{ url_for('static', filename='images/tr_logo.png') }}"
                    alt="TR Logo" style="height: 40px; margin-bottom: 8px; border-radius: 8px;">
            </h2>
            <p class="text-muted">Welcome back to modern banking</p>
        </div>

        <form action="/login" method="POST" class="needs-validation" novalidate>
            <div class="form-floating mb-3">
                <input type="text" class="form-control bg-transparent" id="mobile" name="mobile"
                    placeholder="Mobile Number" required>
                <label for="mobile">Mobile Number</label>
            </div>

            <div class="form-floating mb-4">
                <input type="password" class="form-control bg-transparent" id="password" name="password"
                    placeholder="Password" required>
                <label for="password">Password</label>
            </div>

            <button type="submit" class="btn btn-fintech w-100 py-2 mb-3">Login Securely <i
                    class="fa-solid fa-lock ms-2"></i></button>

            <div class="text-center text-muted small">
                Don't have an account? <a href="/register" class="fw-bold text-primary text-decoration-none">Create an
                    account</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
