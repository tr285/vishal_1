{% extends "base.html" %}

{% block content %}
<div style="display: flex; align-items: center; justify-content: center; min-height: calc(100vh - 150px);" id="success-anim">
    <div class="glass-card" style="width: 100%; max-width: 500px; text-align: center;">
        
        <div style="width: 80px; height: 80px; background: linear-gradient(135deg, var(--success-color) 0%, #00a67a 100%); border-radius: 50%; display: flex; justify-content: center; align-items: center; margin: 0 auto 24px; font-size: 40px; color: white;">
            <i class="fa-solid fa-check"></i>
        </div>

        <h2 style="font-weight: 700; color: var(--success-color); margin: 0 0 8px 0;">Deposit Successful</h2>
        <p style="color: var(--text-tertiary); margin: 0 0 24px 0; font-size: 14px;">Your wallet has been credited with funds</p>

        <div style="background: var(--card-bg-light); padding: 20px; border-radius: 12px; text-align: left; margin-bottom: 24px; border: 1px solid var(--glass-border);">
            <div style="display: flex; justify-content: space-between; padding-bottom: 12px; margin-bottom: 12px; border-bottom: 1px solid var(--glass-border);">
                <span style="color: var(--text-tertiary);">Transaction ID:</span>
                <span style="font-weight: 700; font-family: monospace; color: var(--text-main);">{{ transaction_id }}</span>
            </div>
            <div style="display: flex; justify-content: space-between; padding-bottom: 12px; margin-bottom: 12px; border-bottom: 1px solid var(--glass-border);">
                <span style="color: var(--text-tertiary);">Date & Time:</span>
                <span style="font-weight: 600; font-size: 13px; color: var(--text-main);">{{ payment_time }}</span>
            </div>
            <div style="display: flex; justify-content: space-between; padding-bottom: 12px; margin-bottom: 12px; border-bottom: 1px solid var(--glass-border);">
                <span style="color: var(--text-tertiary);">Paid via:</span>
                <span style="font-weight: 600; color: var(--text-main);">{{ upi_id }}</span>
            </div>
            <div style="display: flex; justify-content: space-between; padding-top: 12px;">
                <span style="color: var(--text-tertiary); font-weight: 600;">Amount Credited:</span>
                <span style="font-weight: 700; font-size: 18px; color: var(--success-color);">₹{{ "%.2f"|format(amount) }}</span>
            </div>
        </div>

        <a href="/dashboard" class="btn btn-primary btn-lg">Return to Dashboard</a>
    </div>
</div>
{% endblock %}
