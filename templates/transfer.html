{% extends "base.html" %}

{% block content %}
<div style="max-width: 500px; margin: 0 auto;">
    <div class="page-header">
        <h1>Transfer Money</h1>
        <p>Send money securely to any contact</p>
    </div>
    
    <div class="glass-card" style="margin-bottom: 20px;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
            <span style="color: var(--text-tertiary); font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;">Available Balance</span>
            <span style="font-weight: 700; font-size: 18px; color: var(--primary-color);">₹{{ "%.2f"|format(balance) }}</span>
        </div>

        <form action="/transfer" method="POST" onsubmit="if(!confirm('Are you sure you want to send this amount?')) return false; showLoader();">
            <div class="form-group">
                <label for="receiver_mobile">Recipient&apos;s Mobile Number</label>
                <input type="tel" class="form-control" id="receiver_mobile" name="receiver_mobile" placeholder="9876543210" pattern="[0-9]{10}" title="Must be 10 digits" required>
                <small>10-digit mobile number</small>
            </div>
            
            <div class="form-group">
                <label for="amount">Amount to Send (₹)</label>
                <input type="number" class="form-control" id="amount" name="amount" placeholder="0.00" min="1" max="{{ balance }}" step="0.01" required>
                <small>Maximum available: ₹{{ "%.2f"|format(balance) }}</small>
            </div>

            <button type="submit" class="btn btn-primary btn-lg">
                <i class="fa-solid fa-paper-plane"></i> Send Securely
            </button>
        </form>
    </div>
</div>
{% endblock %}
