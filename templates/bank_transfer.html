{% extends "base.html" %}

{% block content %}
<div style="max-width: 500px; margin: 0 auto;">
    <div class="page-header">
        <h1><i class="fa-solid fa-building-columns"></i> Bank Transfer</h1>
        <p>Transfer money directly to any bank account</p>
    </div>
    
    <div class="glass-card">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; padding-bottom: 20px; border-bottom: 1px solid var(--glass-border);">
            <span style="color: var(--text-tertiary); font-weight: 600;">Available Balance</span>
            <span style="font-size: 18px; font-weight: 700; color: var(--primary-color);">₹{{ "%.2f"|format(balance) }}</span>
        </div>

        <form action="/bank-transfer" method="POST" onsubmit="if(!confirm('Please verify the account details before confirming this bank transfer.')) return false; showLoader();">
            <div class="form-group">
                <label for="bank_name">Bank Name</label>
                <input type="text" class="form-control" id="bank_name" name="bank_name" placeholder="e.g., HDFC Bank, SBI" required>
                <small>Name of the recipient bank</small>
            </div>

            <div class="form-group">
                <label for="account_no">Account Number</label>
                <input type="text" class="form-control" id="account_no" name="account_no" placeholder="Recipient's account number" required>
                <small>10-16 digit account number</small>
            </div>

            <div class="form-group">
                <label for="ifsc">IFSC Code</label>
                <input type="text" class="form-control" id="ifsc" name="ifsc" placeholder="e.g., HDFC0001234" pattern="[A-Z]{4}0[A-Z0-9]{6}" required>
                <small>11-character IFSC code of the bank branch</small>
            </div>

            <div class="form-group">
                <label for="amount">Amount (₹)</label>
                <input type="number" class="form-control" id="amount" name="amount" placeholder="0.00" min="1" max="1000000" step="0.01" required>
                <small>Transfer amount in Indian Rupees</small>
            </div>

            <button type="submit" class="btn btn-primary btn-lg">
                <i class="fa-solid fa-paper-plane"></i> Transfer Securely
            </button>
        </form>
    </div>
</div>
{% endblock %}
