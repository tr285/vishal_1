{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center mt-4">
    <div class="col-md-6 col-lg-5">
        <h4 class="fw-bold mb-4"><i class="fa-solid fa-building-columns text-info me-2"></i> Bank Transfer</h4>

        <div class="glass-card p-4">
            <div class="d-flex justify-content-between align-items-center mb-4 pb-3 border-bottom border-secondary border-opacity-25">
                <span class="text-muted fw-bold">Available Balance</span>
                <span class="fs-4 fw-bold text-primary">₹{{ "%.2f"|format(balance) }}</span>
            </div>

            <form action="/bank-transfer" method="POST">
                <div class="mb-3">
                    <label class="form-label text-muted small fw-bold">Bank Name</label>
                    <input type="text" name="bank_name" class="form-control bg-dark border-secondary text-white" placeholder="e.g. HDFC Bank, SBI" required>
                </div>

                <div class="mb-3">
                    <label class="form-label text-muted small fw-bold">Account Number</label>
                    <input type="text" name="account_no" class="form-control bg-dark border-secondary text-white" placeholder="Recipient's account number" required>
                </div>

                <div class="mb-3">
                    <label class="form-label text-muted small fw-bold">IFSC Code</label>
                    <input type="text" name="ifsc" class="form-control bg-dark border-secondary text-white" placeholder="e.g. HDFC0001234" required>
                </div>

                <div class="mb-4">
                    <label class="form-label text-muted small fw-bold">Amount (₹)</label>
                    <div class="input-group">
                        <span class="input-group-text bg-dark border-secondary text-secondary">₹</span>
                        <input type="number" name="amount" class="form-control bg-dark border-secondary text-white" min="1" max="1000000" step="0.01" required placeholder="0.00">
                    </div>
                </div>

                <button type="submit" class="btn btn-fintech w-100 py-3 rounded-pill fw-bold" onclick="return confirm('Please verify the account details before confirming this bank transfer.')">
                    <i class="fa-solid fa-paper-plane me-2"></i> Transfer Securely
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
