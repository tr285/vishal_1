<!DOCTYPE html>
<html>
<head>
    <title>OTP Verification</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            height: 100vh;
            background: linear-gradient(135deg,#004aad,#4d79ff);
            display:flex;
            justify-content:center;
            align-items:center;
        }
        .card { border-radius:20px; }
    </style>
</head>
<body>

<div class="card shadow p-4" style="width:350px;">
    <h4 class="text-center mb-3">Enter OTP 🔐</h4>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="alert alert-{{ category }}">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="POST">
        <div class="mb-3">
            <input type="text" name="otp" class="form-control text-center" placeholder="Enter 6-digit OTP" required>
        </div>
        <button type="submit" class="btn btn-dark w-100">Verify</button>
    </form>
</div>

</body>
</html>
