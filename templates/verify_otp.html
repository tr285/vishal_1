<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify OTP - Airteal Payment Bank</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .otp-container {
            width: 100%;
            max-width: 400px;
        }
    </style>
</head>
<body>
    <div class="otp-container">
        <div class="glass-card" style="text-align: center;">
            <div style="width: 80px; height: 80px; background: rgba(0, 102, 255, 0.1); border-radius: 50%; display: flex; justify-content: center; align-items: center; margin: 0 auto 24px; font-size: 40px; color: var(--primary-color);">
                <i class="fa-solid fa-lock"></i>
            </div>

            <h2 style="font-weight: 700; color: var(--text-main); margin: 0 0 8px 0;">Verify OTP</h2>
            <p style="color: var(--text-tertiary); margin: 0 0 24px 0;">Enter the 6-digit code sent to your mobile</p>

            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="alert alert-{{ 'success' if category == 'message' else 'danger' }}" style="margin-bottom: 20px;">
                            {{ message }}
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form method="POST" onsubmit="showLoader();">
                <div class="form-group" style="text-align: left;">
                    <label for="otp">OTP Code</label>
                    <input type="text" class="form-control" id="otp" name="otp" placeholder="000000" maxlength="6" pattern="[0-9]{6}" required style="text-align: center; letter-spacing: 8px; font-size: 20px; font-weight: 700;">
                    <small>6-digit code from your SMS</small>
                </div>
                <button type="submit" class="btn btn-primary btn-lg">
                    <i class="fa-solid fa-check"></i> Verify
                </button>
            </form>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
