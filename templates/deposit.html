{% extends "base.html" %}

{% block content %}
<div class="d-flex align-items-center justify-content-center" style="min-height: 80vh;">
    <div class="glass-card p-4 text-center shadow-lg" style="width: 100%; max-width: 450px; border-radius: 20px;">
        <h3 class="fw-bold text-primary mb-3"><i class="fa-solid fa-qrcode"></i> Add Money via UPI</h3>
        <p class="text-muted small mb-4">Scan this QR code with any UPI app (GPay, PhonePe, Paytm) to deposit funds directly to your Airteal Bank Account.</p>
        
        <!-- Dynamic QR Code pointing to standard UPI intent -->
        <div class="bg-white p-3 rounded d-inline-block shadow-sm mb-4">
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=upi://pay?pa=visha2okicici&pn=Vishal+jagtap" 
                 alt="UPI QR Code" 
                 class="img-fluid rounded" 
                 style="width: 250px; height: 250px;">
        </div>

        <p class="fw-bold mb-3 d-flex align-items-center justify-content-center gap-2"><i class="fa-solid fa-wallet text-success fa-lg"></i> Vishal Jagtap <br> <span class="badge bg-light text-dark fw-normal font-monospace">vishalj2@okicici</span></p>

        <form action="/deposit" method="POST" class="needs-validation text-start mt-4" novalidate onsubmit="document.getElementById('addMoneyBtn').disabled = true;">
            <div class="form-floating mb-3">
                <input type="number" class="form-control bg-transparent fw-bold" id="amount" name="amount" placeholder="Amount (₹)" min="1" required style="font-size: 1.2rem;">
                <label for="amount">Deposit Amount (₹)</label>
            </div>
            
            <div class="form-floating mb-4">
                <input type="text" class="form-control bg-transparent" id="utr" name="utr" placeholder="12-digit UTR No." minlength="12" maxlength="12" pattern="\d{12}" required>
                <label for="utr">12-Digit UTR Number</label>
                <div class="invalid-feedback text-white">Please provide a valid 12-digit UTR from your UPI app.</div>
            </div>

            <button type="submit" id="addMoneyBtn" class="btn btn-fintech w-100 py-3 rounded-pill fw-bold d-flex align-items-center justify-content-center gap-2" style="font-size: 1.1rem;">
                Confirm Deposit <i class="fa-solid fa-circle-check"></i>
            </button>
        </form>
    </div>
</div>
{% endblock %}
