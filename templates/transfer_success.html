{% extends "base.html" %}

{% block content %}
<div style="display: flex; align-items: center; justify-content: center; flex-direction: column; min-height: calc(100vh - 150px);" id="success-anim">
    
    <svg class="success-check" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 52 52" style="width: 120px; height: 120px; margin-bottom: 32px;">
        <circle class="success-check-circle" cx="26" cy="26" r="25" fill="none"/>
        <path class="success-check-path" fill="none" d="M14.1 27.2l7.1 7.2 16.7-16.8"/>
    </svg>

    <h2 style="font-weight: 700; margin: 0 0 16px 0; color: var(--text-main);">Transfer Successful!</h2>
    <h1 style="font-size: 3.5rem; font-weight: 700; color: var(--success-color); margin: 0 0 8px 0;">₹{{ "%.2f"|format(amount) }}</h1>
    <p style="color: var(--text-tertiary); margin: 0 0 32px 0; font-size: 16px;">Sent securely to <strong style="color: var(--text-main);">{{ receiver_name }}</strong></p>

    <div style="display: flex; gap: 12px; flex-wrap: wrap; justify-content: center;">
        <a href="/dashboard" class="btn btn-primary">Go to Dashboard</a>
        <a href="/transfer" class="btn btn-secondary">Send More Money</a>
    </div>
</div>

<style>
    .success-check-circle {
        stroke-dasharray: 166;
        stroke-dashoffset: 166;
        stroke-width: 2;
        stroke-miterlimit: 10;
        stroke: var(--success-color);
        animation: stroke 0.6s cubic-bezier(0.65, 0, 0.45, 1) forwards;
    }

    .success-check-path {
        stroke-dasharray: 48;
        stroke-dashoffset: 48;
        stroke-width: 2;
        stroke: var(--success-color);
        transform-origin: 50% 50%;
        animation: stroke 0.3s cubic-bezier(0.65, 0, 0.45, 1) 0.8s forwards;
    }

    @keyframes stroke {
        100% { stroke-dashoffset: 0; }
    }
</style>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<script>
    document.addEventListener("DOMContentLoaded", function() {
        var duration = 3 * 1000;
        var end = Date.now() + duration;

        (function frame() {
            confetti({
                particleCount: 5,
                angle: 60,
                spread: 55,
                origin: { x: 0 },
                colors: ['#0066ff', '#00d9a3', '#ffb800']
            });
            confetti({
                particleCount: 5,
                angle: 120,
                spread: 55,
                origin: { x: 1 },
                colors: ['#0066ff', '#00d9a3', '#ffb800']
            });

            if (Date.now() < end) {
                requestAnimationFrame(frame);
            }
        }());
    });
</script>
{% endblock %}
